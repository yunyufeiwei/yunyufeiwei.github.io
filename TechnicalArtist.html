<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术美术作品集</title>
    <link rel="icon" href="assets/Image/Icon/avatar.png" sizes="32x32"/>
    <style>
        :root {
            --hue-color: 250;
            --bg-color: hsl(var(--hue-color), 28%, 12%);
            --card-gap: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: #e3e3e3;
            font-family: 'Poppins', sans-serif;
            line-height: 1.5;
        }

        /* 顶部导航栏 - 始终固定在顶部 */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--bg-color);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            backdrop-filter: none;
            background: hsla(var(--hue-color), 28%, 12%, 0.98);
        }

        .nav-btn {
            padding: 8px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            color: #d0d0d0;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: hsl(var(--hue-color), 69%, 61%);
            color: hsl(var(--hue-color), 69%, 71%);
        }

        .nav-btn.active {
            background: hsl(var(--hue-color), 69%, 61%);
            border-color: hsl(var(--hue-color), 69%, 61%);
            color: #fff;
        }

        /* 页面标题 */
        .page-header {
            text-align: center;
            padding: 16px 16px 10px;
        }

        .page-title {
            font-size: 2rem;
            color: hsl(var(--hue-color), 69%, 61%);
        }

        /* 主内容区域 */
        .main-content {
            max-width: 95%;
            margin: 0 auto;
            padding: 12px 18px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 分类区域 */
        .category-section {
            margin-bottom: 0;
        }

        .category-title {
            display: none;
        }

        /* 卡片网格 - 默认4列 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        /* 卡片样式 */
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: zoom-in;
            will-change: transform;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .card .image-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }

        .card .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card:hover .image-container img {
            /* 不对图片做 scale 变换，避免 GIF 重绘卡顿 */
        }

        .card .card-title {
            padding: 6px 8px;
            font-size: 0.8rem;
            color: #c0c0c0;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 放大图片的容器 */
        .enlarged-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .enlarged-container.active {
            opacity: 1;
            visibility: visible;
        }

        .enlarged-image {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            cursor: zoom-out;
        }

        .enlarged-container.active .enlarged-image {
            /* 无 scale 动画，避免大尺寸 GIF 渲染卡顿 */
        }

        /* 响应式：3列 */
        @media (max-width: 1200px) {
            .card-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* 响应式：2列 */
        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .top-nav {
                padding: 10px 16px;
                gap: 8px;
            }

            .nav-btn {
                padding: 6px 16px;
                font-size: 13px;
            }

            .page-title {
                font-size: 1.5rem;
            }

            .main-content {
                padding: 0 16px 32px;
            }
        }

        /* 响应式：1列 */
        @media (max-width: 480px) {
            .card-grid {
                grid-template-columns: 1fr;
            }

            .top-nav {
                padding: 8px 12px;
                gap: 6px;
            }

            .nav-btn {
                padding: 5px 12px;
                font-size: 12px;
            }

            .page-title {
                font-size: 1.3rem;
            }

            .main-content {
                padding: 0 12px 24px;
            }
        }
    </style>
</head>

<body>

<!-- 顶部分类导航 - sticky固定 -->
<nav class="top-nav">
    <button class="nav-btn active" data-category="all">全部</button>
    <button class="nav-btn" data-category="role">角色</button>
    <button class="nav-btn" data-category="scene">场景</button>
    <button class="nav-btn" data-category="effect">特效</button>
    <button class="nav-btn" data-category="ui">UI</button>
    <button class="nav-btn" data-category="post">后期</button>
    <button class="nav-btn" data-category="pcg">PCG</button>
</nav>

<!-- 页面标题 -->
<header class="page-header" style="display:none;">
    <h1 class="page-title">技术美术作品集</h1>
</header>

<!-- 主内容区域 -->
<div class="main-content">

    <!-- 角色 -->
    <section class="category-section" id="section-role" data-category="role">
        <h2 class="category-title">角色</h2>
        <div class="card-grid">
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/Rendering/角色/【Role】雷音.png" alt="雷音角色渲染">
                </div>
                <div class="card-title">雷音</div>
            </div>
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/Rendering/角色/【Role】老虎.png" alt="老虎">
                </div>
                <div class="card-title">老虎</div>
            </div>
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/Rendering/角色/【Role】Moon.gif" alt="Moon角色渲染">
                </div>
                <div class="card-title">Moon</div>
            </div>
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/Rendering/角色/【Role】史莱姆.gif" alt="史莱姆">
                </div>
                <div class="card-title">史莱姆</div>
            </div>
        </div>
    </section>

    <!-- 场景 -->
    <section class="category-section" id="section-scene" data-category="scene">
        <h2 class="category-title">场景</h2>
        <div class="card-grid">
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/Rendering/场景/【场景】GroundPOM.png" alt="视差贴花">
                </div>
                <div class="card-title">视差贴花</div>
            </div>
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/Rendering/场景/【场景】Ground-熔岩视差.png" alt="视差熔岩">
                </div>
                <div class="card-title">视差熔岩</div>
            </div>
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/Rendering/场景/【场景】草地.gif" alt="草地">
                </div>
                <div class="card-title">草地</div>
            </div>
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/Rendering/场景/【场景】Grass-灌木动画.gif" alt="灌木">
                </div>
                <div class="card-title">灌木</div>
            </div>
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/Rendering/场景/【场景】Water-01.gif" alt="水体渲染">
                </div>
                <div class="card-title">水体渲染</div>
            </div>
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/Rendering/场景/【场景】Water-Flowmap.gif" alt="FlowMap">
                </div>
                <div class="card-title">FlowMap</div>
            </div>
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/Rendering/场景/【场景】WaterRain.gif" alt="RainWater">
                </div>
                <div class="card-title">RainWater</div>
            </div>
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/Rendering/场景/【场景】玻璃窗户.gif" alt="玻璃窗户">
                </div>
                <div class="card-title">玻璃窗户</div>
            </div>
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/Rendering/场景/【场景】Glass.png" alt="玻璃杯">
                </div>
                <div class="card-title">玻璃杯</div>
            </div>
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/Rendering/场景/【场景】水晶.gif" alt="水晶">
                </div>
                <div class="card-title">水晶</div>
            </div>
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/Rendering/场景/【场景】crystal-砖石.gif" alt="钻石">
                </div>
                <div class="card-title">钻石</div>
            </div>
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/Rendering/场景/【场景】综合效果01.gif" alt="综合效果">
                </div>
                <div class="card-title">综合效果</div>
            </div>
        </div>
    </section>

    <!-- 特效 -->
    <section class="category-section" id="section-effect" data-category="effect">
        <h2 class="category-title">特效</h2>
        <div class="card-grid">
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/Rendering/特效/【Effect】能量体.gif" alt="能量体">
                </div>
                <div class="card-title">能量体</div>
            </div>
        </div>
    </section>

    <!-- UI -->
    <section class="category-section" id="section-ui" data-category="ui">
        <h2 class="category-title">UI</h2>
        <div class="card-grid">
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/Rendering/UI/【UI】图形模拟.gif" alt="粒子模拟">
                </div>
                <div class="card-title">粒子模拟</div>
            </div>
        </div>
    </section>

    <!-- 后期 -->
    <section class="category-section" id="section-post" data-category="post">
        <h2 class="category-title">后期</h2>
        <div class="card-grid">
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/Rendering/后期/【后处理】外描边.gif" alt="外描边">
                </div>
                <div class="card-title">外描边</div>
            </div>
        </div>
    </section>

    <!-- PCG -->
    <section class="category-section" id="section-pcg" data-category="pcg">
        <h2 class="category-title">PCG</h2>
        <div class="card-grid">
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/PCG/PCG生态群落.png" alt="PCG生态群落">
                </div>
                <div class="card-title">生态群落</div>
            </div>
            <div class="card">
                <div class="image-container">
                    <img src="assets/ImageWork/PCG/PCG静态网格.png" alt="PCG静态网格">
                </div>
                <div class="card-title">静态网格</div>
            </div>
        </div>
    </section>

</div>

<!-- 放大图片的容器 -->
<div id="enlargedContainer" class="enlarged-container">
    <img id="enlargedImage" class="enlarged-image" src="" alt="放大图片">
</div>

<script>
(function() {
    // GIF 首帧冻结：将 GIF 图片替换为 canvas 显示首帧
    const cards = document.querySelectorAll('.card');
    cards.forEach(card => {
        const img = card.querySelector('img');
        if (!img) return;
        const src = img.getAttribute('src');
        if (!src.toLowerCase().endsWith('.gif')) return;

        // 保存原始 GIF 地址
        card.dataset.gifSrc = src;

        // 创建一个隐藏的 Image 加载 GIF 首帧
        const tempImg = new Image();
        tempImg.crossOrigin = 'anonymous';
        tempImg.onload = function() {
            // 用 canvas 截取首帧
            const canvas = document.createElement('canvas');
            canvas.width = tempImg.naturalWidth;
            canvas.height = tempImg.naturalHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(tempImg, 0, 0);
            // 将 img src 替换为首帧静态图
            img.src = canvas.toDataURL('image/png');
        };
        tempImg.src = src;
    });

    // 顶部分类按钮点击 - 滚动到对应分类
    const navBtns = document.querySelectorAll('.top-nav .nav-btn');
    const sections = document.querySelectorAll('.category-section');
    const topNav = document.querySelector('.top-nav');

    navBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            const category = this.dataset.category;

            // 更新按钮激活状态
            navBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');

            if (category === 'all') {
                sections.forEach(s => s.style.display = '');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                sections.forEach(s => s.style.display = '');
                const target = document.getElementById('section-' + category);
                if (target) {
                    const navHeight = topNav.offsetHeight;
                    const targetTop = target.getBoundingClientRect().top + window.pageYOffset - navHeight - 12;
                    window.scrollTo({ top: targetTop, behavior: 'smooth' });
                }
            }
        });
    });

    // 滚动时更新导航按钮高亮
    window.addEventListener('scroll', function() {
        const navHeight = topNav.offsetHeight;
        let currentCategory = 'all';

        sections.forEach(section => {
            const rect = section.getBoundingClientRect();
            if (rect.top <= navHeight + 50) {
                currentCategory = section.dataset.category;
            }
        });

        navBtns.forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.category === currentCategory) {
                btn.classList.add('active');
            }
        });
    });

    // 图片点击放大 - GIF 使用原始动态地址
    const enlargedContainer = document.getElementById('enlargedContainer');
    const enlargedImage = document.getElementById('enlargedImage');

    cards.forEach(card => {
        card.addEventListener('click', function() {
            const img = this.querySelector('img');
            if (img) {
                // 如果是 GIF 卡片，放大时使用原始 GIF 地址播放动画
                const gifSrc = this.dataset.gifSrc;
                enlargedImage.src = gifSrc || img.src;
                enlargedImage.alt = img.alt;
                enlargedContainer.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        });
    });

    enlargedContainer.addEventListener('click', function() {
        this.classList.remove('active');
        enlargedImage.src = '';
        document.body.style.overflow = '';
    });

    // ESC关闭放大图片
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && enlargedContainer.classList.contains('active')) {
            enlargedContainer.classList.remove('active');
            enlargedImage.src = '';
            document.body.style.overflow = '';
        }
    });
})();
</script>

</body>
</html>
